<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina</title>
    <style>
      :root {
        --bg: hsl(240 10% 6%);
        --card: hsl(240 9% 8%);
        --fg: hsl(240 6% 92%);
        --muted: hsl(240 5% 58%);
        --primary: hsl(245 80% 67%);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        cursor: default;
      }
      .card {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: var(--card);
        border: 1px solid hsl(240 6% 16%);
        border-radius: 16px;
      }
      .badge {
        width: 76px;
        height: 76px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 20px;
        background: var(--primary);
        color: #fff;
        box-shadow: 0 12px 34px -10px hsl(245 80% 67% / 0.65);
        animation: pop 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .badge svg { width: 42px; height: 42px; }
      .wordmark {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--fg);
      }
      .tagline {
        margin-top: -12px;
        font-size: 12.5px;
        color: var(--muted);
      }
      .track {
        width: 148px;
        height: 3px;
        border-radius: 999px;
        background: hsl(240 6% 16%);
        overflow: hidden;
      }
      .track::after {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        border-radius: 999px;
        background: var(--primary);
        animation: slide 1.15s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
      @keyframes pop {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="m14.31 8 5.74 9.94" />
          <path d="M9.69 8h11.48" />
          <path d="m7.38 12 5.74-9.94" />
          <path d="M9.69 16 3.95 6.06" />
          <path d="M14.31 16H2.83" />
          <path d="m16.62 12-5.74 9.94" />
        </svg>
      </div>
      <div class="wordmark">Lumina</div>
      <div class="tagline">Loading your library…</div>
      <div class="track"></div>
    </div>
  </body>
</html>
